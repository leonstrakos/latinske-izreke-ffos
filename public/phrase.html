<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Latin Phrase</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>





<div class="phrasepage" id="phrase-container">
    <p>Loading...</p>



</div>



<script>
async function loadPhrase() {
    const params = new URLSearchParams(window.location.search);
    const phraseParam = params.get('phrase');

    if (!phraseParam) {
        document.getElementById('phrase-container').textContent = 'No phrase specified.';
        return;
    }

    const decodedPhrase = decodeURIComponent(phraseParam);

    try {
        const response = await fetch('./json/fraze_prevedene.json');
        const data = await response.json();

        const entry = data.entries.find(e => e.phrase === decodedPhrase);

        if (!entry) {
            document.getElementById('phrase-container').textContent = 'Phrase not found.';
            return;
        }

        renderEntry(entry);

    } catch (err) {
        console.error(err);
        document.getElementById('phrase-container').textContent = 'Error loading data.';
    }
}





function renderEntry(entry) {
    const container = document.getElementById('phrase-container');

    const isSaved = isBookmarked(entry.phrase);
    const bookmarkSrc = isSaved
        ? "./img/gold_bookmark.png"
        : "./img/silver_bookmark.png";

    // Only display if field is non-empty
        const authorText = entry.author && entry.author.trim() ? `— ${entry.author}` : "";
        const sourceText = entry.source && entry.source.trim() ? `(${entry.source})` : "";
        const yearText = entry.year && entry.year.toString().trim() ? entry.year : "";

    container.innerHTML = `
<div class="top-icons">
                <img
                    class="arrow-icon"
                    src="./img/arrow.png"
                    alt="back"
                    onclick="history.back()"
                >

                <img
                    class="silver_bookmark"
                    src="${bookmarkSrc}"
                    alt="bookmark icon"
                    data-phrase="${entry.phrase}"
                >
            </div>

        <h1 class="phrasepage h1 chrome-text">„${entry.phrase}“</h1>

        <div class="phrase-meta">
            <span class="phrasepage author">${authorText}</span>
            <span class="phrasepage book">${sourceText}</span>
        </div>

        <p class="phrasepage year">${yearText}</p>

        <div class="phrase-block">
            <h3 class="phraseh3">English</h3>
            <p class="phrasep">${entry.common_translation?.en || ""}</p>
            <p class="phrasep">${entry.meaning || ""}</p>

            <h3 class="phraseh3">Hrvatski</h3>
            <p class="phrasep">${entry.common_translation?.hr || ""}</p>
            <p class="phrasep">${entry.znacenje?.hr || ""}</p>

        </div>
    `;
}



document.addEventListener('DOMContentLoaded', loadPhrase);


/////////////////////////////////////
//===================================
// BOOKMARKS


document.addEventListener("click", (e) => {
    if (!e.target.classList.contains("silver_bookmark")) return;

    const img = e.target;

    // 🔹 POP ANIMATION
    img.classList.remove("bookmark-pop");
    void img.offsetWidth; // force reflow so animation can replay
    img.classList.add("bookmark-pop");

    const phrase = img.dataset.phrase;
    let bookmarks = getBookmarks();

    if (bookmarks.includes(phrase)) {
        bookmarks = bookmarks.filter(p => p !== phrase);
        img.src = "./img/silver_bookmark.png";
    } else {
        bookmarks.push(phrase);
        img.src = "./img/gold_bookmark.png";
    }

    saveBookmarks(bookmarks);
});




function getBookmarks() {
    return JSON.parse(localStorage.getItem("bookmarkedPhrases")) || [];
}

function saveBookmarks(bookmarks) {
    localStorage.setItem("bookmarkedPhrases", JSON.stringify(bookmarks));
}

function isBookmarked(phrase) {
    return getBookmarks().includes(phrase);
}






if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js")
      .then(() => console.log("Service Worker registered"))
      .catch(err => console.error("SW registration failed:", err));
  });
}

</script>

</body>
</html>
